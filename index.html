<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Waiting for Something ❤️</title>

<link rel="stylesheet" href="countdown.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>

<body>

<div class="stars"></div>

<div class="container">
  <h1>Something is waiting for you ❤️</h1>
  <p class="subtitle">Every second is bringing you closer...</p>

  <div id="timer">
    <span id="days">0</span>d :
    <span id="hours">0</span>h :
    <span id="minutes">0</span>m :
    <span id="seconds">0</span>s
  </div>

  <button id="surpriseBtn" onclick="goToMain()">
    Open Your Surprise ❤️
  </button>
</div>

<script src="countdown.js"></script>

</body>
</html>
